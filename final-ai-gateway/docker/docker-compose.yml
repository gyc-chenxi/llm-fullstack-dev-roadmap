version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - gateway-net

  # Redis Commander (optional — web UI for Redis inspection)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ai-gateway-redis-ui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gateway-net
    profiles:
      - tools

volumes:
  redis_data:

networks:
  gateway-net:
    driver: bridge
