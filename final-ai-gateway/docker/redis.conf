# Redis Configuration for AI-Gateway
# Used with: redis-server /usr/local/etc/redis/redis.conf

# --- Network ---
bind 0.0.0.0
port 6379
protected-mode no

# --- Memory ---
maxmemory 512mb
maxmemory-policy allkeys-lru

# --- Persistence ---
appendonly yes
appendfsync everysec

# --- Performance ---
tcp-backlog 511
tcp-keepalive 300

# --- Connections ---
timeout 0

# --- Slow Log ---
slowlog-log-slower-than 10000
slowlog-max-len 128
