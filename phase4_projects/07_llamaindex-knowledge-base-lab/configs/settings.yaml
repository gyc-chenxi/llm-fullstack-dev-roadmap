# ============================================================
# P7 LlamaIndex Lab — 运行时主配置
# ============================================================
#
# 配置层次：环境变量 > settings.yaml > 代码硬编码默认值
#
# 核心参数说明：
#   embedding.model_name: BGE-Small-ZH 本地路径（避免每次联网下载）
#   embedding.device: MPS (Apple Silicon GPU 加速) | cpu
#   embedding.max_length: 512 对应 BGE-small-zh 的最大输入长度
#   llm.provider: ollama (本地) | openai | deepseek
#   llm.temperature: 0.0 确定性输出（事实性问答需要稳定性）
#   index.chunk_size: 500 字符，中文约 250-350 字
#   index.chunk_overlap: 50 字符，10% 重叠确保跨边界实体完整性
#   index.similarity_top_k: 5 每次检索返回 top-5 片段
#   index.embed_batch_size: 32 在 32GB 统一内存上安全的批大小
#   vector_store.persist_dir: ChromaDB 持久化目录
# ============================================================

embedding:
  model_name: "models/bge-small-zh-v1.5"
  device: "mps"
  normalize: true
  max_length: 512

llm:
  provider: "ollama"
  model: "qwen2.5:7b"
  temperature: 0.0
  max_tokens: 1024

index:
  persist_dir: "storage"
  similarity_top_k: 5
  chunk_size: 500
  chunk_overlap: 50
  embed_batch_size: 32

vector_store:
  persist_dir: "data/vector_store"
  collection_name: "llamaindex_kb"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"

logging:
  level: "INFO"
  file: "logs/llamaindex.log"
