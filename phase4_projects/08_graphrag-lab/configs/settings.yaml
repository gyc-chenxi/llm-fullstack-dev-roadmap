# ============================================================
# P8 GraphRAG — DeepSeek API + 本地 BGE-M3 配置
# ============================================================
#
# GraphRAG 3.1.0 配置说明：
#
# LLM (DeepSeek):
#   - api_key: 从环境变量 GRAPHRAG_API_KEY 读取
#   - api_base: 指向 DeepSeek v1 API
#   - model_supports_json: 实体/关系提取需要结构化 JSON 输出
#   - concurrent_requests=4: DeepSeek 免费/低价 tier 的并发限制
#
# Embedding (本地 BGE-M3 服务):
#   - 端点: http://127.0.0.1:19530/v1（通过 serve_embedding.py 启动）
#   - 本地 BGE-M3 替代 OpenAI Embeddings，零成本
#   - concurrent_requests=8: MPS 上本地编码可支持更高并发
#
# 实体类型（AI/ML 领域）:
#   ORGANIZATION, PERSON, METHOD, MODEL, ALGORITHM, DATASET, CONCEPT,
#   TECHNOLOGY, METRIC, FRAMEWORK
#
# 分块策略:
#   size=1200 tokens, overlap=100 tokens（匹配 cl100k_base tokenizer）
#   group_by_columns=[id]: 保持文档完整性
# ============================================================

encoding_model: cl100k_base
skip_workflows: []

llm:
  api_key: ${GRAPHRAG_API_KEY}
  type: openai_chat
  model: deepseek-chat
  api_base: https://api.deepseek.com/v1
  model_supports_json: true
  max_tokens: 4000
  request_timeout: 180.0
  concurrent_requests: 4
  tokens_per_minute: null
  requests_per_minute: null
  sleep_on_rate_limit_recommendation: true

parallelization:
  stagger: 0.3
  num_threads: 8

async_mode: threaded

embeddings:
  async_mode: threaded
  llm:
    api_key: ${GRAPHRAG_EMBEDDING_API_KEY}
    type: openai_embedding
    model: ${GRAPHRAG_EMBEDDING_MODEL}
    api_base: ${GRAPHRAG_EMBEDDING_API_BASE}
    concurrent_requests: 8
    tokens_per_minute: null
    requests_per_minute: null

chunks:
  size: 1200
  overlap: 100
  group_by_columns: [id]

input:
  type: file
  file_type: text
  base_dir: "data/input"

output:
  type: file
  base_dir: "data/output"

reporting:
  type: file
  base_dir: "logs"

entity_extraction:
  entity_types:
    - ORGANIZATION
    - PERSON
    - GEO
    - EVENT
    - TECHNOLOGY
    - METHOD
    - DATASET
    - MODEL
    - ALGORITHM
    - CONCEPT
    - METRIC
    - FRAMEWORK
  max_gleanings: 1

summarize_descriptions:
  max_length: 500

community_reports:
  max_length: 2000
  max_input_length: 8000

cluster_graph:
  max_cluster_size: 10

umap:
  enabled: false

embed_graph:
  enabled: false

snapshots:
  graphml: true
  raw_graph: true
