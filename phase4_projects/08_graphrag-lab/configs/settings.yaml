encoding_model: cl100k_base
skip_workflows: []

llm:
  api_key: ${GRAPHRAG_API_KEY}
  type: openai_chat
  model: deepseek-chat
  api_base: https://api.deepseek.com/v1
  model_supports_json: true
  max_tokens: 4000
  request_timeout: 180.0
  concurrent_requests: 4
  tokens_per_minute: null
  requests_per_minute: null
  sleep_on_rate_limit_recommendation: true

parallelization:
  stagger: 0.3
  num_threads: 8

async_mode: threaded

embeddings:
  async_mode: threaded
  llm:
    api_key: ${GRAPHRAG_EMBEDDING_API_KEY}
    type: openai_embedding
    model: ${GRAPHRAG_EMBEDDING_MODEL}
    api_base: ${GRAPHRAG_EMBEDDING_API_BASE}
    concurrent_requests: 8
    tokens_per_minute: null
    requests_per_minute: null

chunks:
  size: 1200
  overlap: 100
  group_by_columns: [id]

input:
  type: file
  file_type: text
  base_dir: "data/input"

output:
  type: file
  base_dir: "data/output"

reporting:
  type: file
  base_dir: "logs"

entity_extraction:
  entity_types:
    - ORGANIZATION
    - PERSON
    - GEO
    - EVENT
    - TECHNOLOGY
    - METHOD
    - DATASET
    - MODEL
    - ALGORITHM
    - CONCEPT
    - METRIC
    - FRAMEWORK
  max_gleanings: 1

summarize_descriptions:
  max_length: 500

community_reports:
  max_length: 2000
  max_input_length: 8000

cluster_graph:
  max_cluster_size: 10

umap:
  enabled: false

embed_graph:
  enabled: false

snapshots:
  graphml: true
  raw_graph: true
