version: 1

formatters:
  detailed:
    format: "[%(asctime)s] %(levelname)-5s %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  console:
    format: "[%(asctime)s] %(levelname)s %(name)s: %(message)s"
    datefmt: "%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: console
    stream: ext://sys.stdout

  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: detailed
    filename: outputs/logs/sam2_lab.log
    mode: a
    encoding: utf-8

loggers:
  sam2_lab:
    level: DEBUG
    handlers: [console, file]
    propagate: false

root:
  level: INFO
  handlers: [console]
