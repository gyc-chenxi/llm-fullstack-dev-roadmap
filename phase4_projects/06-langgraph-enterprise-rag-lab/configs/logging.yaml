# Logging configuration (compatible with loguru / standard logging)

version: 1

formatters:
  default:
    format: "[%(asctime)s] [%(levelname)-7s] [%(name)s] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout

  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: default
    filename: logs/app.log

root:
  level: INFO
  handlers:
    - console
